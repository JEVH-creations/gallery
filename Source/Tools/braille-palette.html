<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Braille Unicode Patterns</title>
<style>
  :root{
    --bg:#EAE6DC;
    --surface:#F5F2EA;
    --fg:#221F1D;
    --fg-dim:#6B6459;
    --accent:#2F6F62;
    --accent-fg:#F5F2EA;
    --border:#D8D2C4;
    --toast-bg:#221F1D;
    --toast-fg:#F5F2EA;
  }
  html[data-theme="dark"]{
    --bg:#17181A;
    --surface:#1F2123;
    --fg:#ECE8DE;
    --fg-dim:#8B8781;
    --accent:#6FA88F;
    --accent-fg:#111312;
    --border:#33353A;
    --toast-bg:#ECE8DE;
    --toast-fg:#17181A;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    background:var(--bg);
    color:var(--fg);
    font-family:'IBM Plex Mono','SF Mono',Consolas,Menlo,monospace;
    overscroll-behavior:none;
  }

  body{
    display:flex;
    flex-direction:column;
    height:100dvh;
  }

  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    height:46px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }

  h1{
    font-size:13px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin:0;
    color:var(--fg);
  }

  #header-controls{
    display:flex;
    align-items:center;
    gap:8px;
  }

  #theme-toggle, #dot-tip-toggle, #sort-toggle{
    appearance:none;
    border:1px solid var(--border);
    background:transparent;
    color:var(--fg);
    width:30px;
    height:30px;
    border-radius:4px;
    font-size:16px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  #theme-toggle:hover, #dot-tip-toggle:hover, #sort-toggle:hover{
    border-color:var(--accent);
    color:var(--accent);
  }
  #dot-tip-toggle[aria-pressed="false"]{
    color:var(--fg-dim);
  }

  #info-bar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 14px;
    height:32px;
    border-bottom:1px solid var(--border);
    background:var(--bg);
    font-size:12px;
    color:var(--fg-dim);
  }

  #info-bar .info-text{
    letter-spacing:.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #info-bar .info-text .info-char{
    color:var(--fg);
    font-size:14px;
    margin-right:2px;
  }

  main{
    flex:1 1 auto;
    overflow-y:auto;
    padding:4px;
  }

  #grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(42px, 1fr));
    gap:3px;
  }

  .cell{
    appearance:none;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--fg);
    aspect-ratio:1 / 1;
    border-radius:3px;
    font-size:1.35rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:0;
    transition:background .12s ease, color .12s ease, border-color .12s ease, transform .08s ease;
  }

  .cell:hover{
    border-color:var(--accent);
    color:var(--accent);
  }

  .cell:active{
    transform:scale(.92);
  }

  .cell.copied{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--accent-fg);
  }

  #toast{
    position:fixed;
    left:50%;
    bottom:16px;
    transform:translate(-50%, 12px);
    background:var(--toast-bg);
    color:var(--toast-fg);
    font-size:12px;
    letter-spacing:.03em;
    padding:8px 14px;
    border-radius:5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease, transform .15s ease;
    white-space:nowrap;
  }
  #toast.show{
    opacity:1;
    transform:translate(-50%, 0);
  }

  main::-webkit-scrollbar{width:8px;}
  main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  #dot-tip{
    position:fixed;
    z-index:10;
    display:flex;
    background:var(--toast-bg);
    padding:8px;
    border-radius:6px;
    opacity:0;
    transform:translate(-50%, 6px);
    pointer-events:none;
    transition:opacity .1s ease, transform .1s ease;
  }
  #dot-tip.show{
    opacity:1;
    transform:translate(-50%, 0);
  }

  #dot-tip .dot-grid{
    display:grid;
    grid-template-columns:repeat(2, 14px);
    grid-template-rows:repeat(4, 14px);
    gap:3px;
  }
  #dot-tip .dot{
    width:14px;
    height:14px;
    border-radius:50%;
    border:1px solid var(--toast-fg);
    color:var(--toast-fg);
    font-size:8px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:.45;
  }
  #dot-tip .dot.on{
    background:var(--accent);
    border-color:var(--accent);
    opacity:1;
  }

  @media (prefers-reduced-motion: reduce){
    .cell, #theme-toggle, #toast, #dot-tip{transition:none;}
  }
</style>
</head>
<body>

<header>
  <h1>Braille Unicode Patterns</h1>
  <div id="header-controls">
    <button id="sort-toggle" aria-label="Cycle sort order">#</button>
    <button id="dot-tip-toggle" aria-label="Toggle floating dot-pattern visual guide">⣿</button>
    <button id="theme-toggle" aria-label="Toggle light and dark theme">◇</button>
  </div>
</header>

<div id="info-bar">
  <span class="info-text" id="info-text">Hover or focus a cell to see its codepoint and meaning</span>
</div>

<main>
  <div id="grid"></div>
</main>

<div id="toast"></div>
<div id="dot-tip"></div>

<script>
  const grid = document.getElementById('grid');
  const toast = document.getElementById('toast');
  const themeToggle = document.getElementById('theme-toggle');
  const root = document.documentElement;

  const dotTip = document.getElementById('dot-tip');
  const dotTipToggle = document.getElementById('dot-tip-toggle');
  const sortToggle = document.getElementById('sort-toggle');
  const infoText = document.getElementById('info-text');
  const infoTextDefault = infoText.textContent;
  // Cell layout order, read left-to-right / top-to-bottom: 1 4 / 2 5 / 3 6 / 7 8
  const DOT_LAYOUT = [1, 4, 2, 5, 3, 6, 7, 8];

  // English Braille (EBAE/UEB "Grade 2") meanings for the 64 six-dot patterns (dots 1-6).
  // Bit weights: dot1=1 dot2=2 dot3=4 dot4=8 dot5=16 dot6=32.
  // Digits 0-9 reuse the a-j letter patterns when preceded by the number sign.
  const DIGITS = {1:'1',3:'2',9:'3',25:'4',17:'5',11:'6',27:'7',19:'8',10:'9',26:'0'};
  const BRAILLE_MEANING = {
    0:  'space',
    1:  'letter a', 3:  'letter b', 9:  'letter c', 25: 'letter d', 17: 'letter e',
    11: 'letter f', 27: 'letter g', 19: 'letter h', 10: 'letter i', 26: 'letter j',
    5:  'letter k', 7:  'letter l', 13: 'letter m', 29: 'letter n', 21: 'letter o',
    15: 'letter p', 31: 'letter q', 23: 'letter r', 14: 'letter s', 30: 'letter t',
    37: 'letter u', 39: 'letter v', 45: 'letter x', 61: 'letter y', 53: 'letter z',
    58: 'letter w',
    47: 'word-sign "and"', 63: 'word-sign "for"', 55: 'word-sign "of"',
    46: 'word-sign "the"', 62: 'word-sign "with"',
    33: 'letter-group "ch"', 35: 'letter-group "gh"', 41: 'letter-group "sh"',
    57: 'letter-group "th"', 49: 'letter-group "wh"', 43: 'letter-group "ed"',
    59: 'letter-group "er"', 51: 'letter-group "ou"', 42: 'letter-group "ow"',
    2:  'comma ,', 6:  'semicolon ;', 18: 'colon :', 50: 'period .',
    22: 'exclamation mark !', 54: 'parentheses ( )', 38: 'question mark ?',
    52: 'closing quotation mark',
    34: 'word-sign "en" (enough)', 20: 'word-sign "in"',
    4:  "apostrophe '", 36: 'dash \u2013', 32: 'capital sign', 8: 'accent / diacritic mark'
  };

  function describeMeaning(mask){
    if (mask in BRAILLE_MEANING) {
      let label = BRAILLE_MEANING[mask];
      if (mask in DIGITS) label += ' \u00b7 digit ' + DIGITS[mask] + ' after number sign';
      return label;
    }
    if (mask > 63) return '8-dot pattern \u2014 computer braille, no literary meaning';
    return 'no standard meaning in English Braille';
  }

  // Grouping used by "sort by meaning": letters -> word-signs -> letter-groups -> punctuation -> other marks -> unassigned -> 8-dot
  const PUNCTUATION_LABELS = ['comma ,', 'semicolon ;', 'colon :', 'period .', 'exclamation mark !', 'parentheses ( )', 'question mark ?', 'closing quotation mark'];
  function meaningSortKey(mask){
    const label = BRAILLE_MEANING[mask];
    if (mask === 0) return '0_';
    if (label) {
      if (label.startsWith('letter ')) return '1_' + label.slice(7);           // alphabetical a-z
      if (label.startsWith('word-sign')) return '2_' + label;
      if (label.startsWith('letter-group')) return '3_' + label;
      if (PUNCTUATION_LABELS.includes(label)) return '4_' + label;
      return '5_' + String(mask).padStart(3, '0');                            // apostrophe, dash, capital, accent
    }
    if (mask < 64) return '6_' + String(mask).padStart(3, '0');                // unassigned six-dot
    return '7_' + String(mask).padStart(3, '0');                               // 8-dot computer braille
  }

  function countBits(mask){
    let n = mask, c = 0;
    while (n) { c += n & 1; n >>= 1; }
    return c;
  }

  let dotTipEnabled = localStorage.getItem('braille-palette-dot-tip') !== 'off';
  function applyDotTipToggle(enabled){
    dotTipEnabled = enabled;
    dotTipToggle.textContent = enabled ? '⣿' : '⌕';
    dotTipToggle.setAttribute('aria-pressed', String(enabled));
    localStorage.setItem('braille-palette-dot-tip', enabled ? 'on' : 'off');
    if (!enabled) hideDotTip();
  }
  applyDotTipToggle(dotTipEnabled);
  dotTipToggle.addEventListener('click', () => applyDotTipToggle(!dotTipEnabled));

  // Build all 256 Braille Unicode Patterns: U+2800 - U+28FF
  const frag = document.createDocumentFragment();
  for (let i = 0x2800; i <= 0x28FF; i++) {
    const char = String.fromCodePoint(i);
    const mask = i - 0x2800;
    const btn = document.createElement('button');
    btn.className = 'cell';
    btn.textContent = char;
    btn.dataset.mask = mask;
    btn.dataset.hex = 'U+' + i.toString(16).toUpperCase();
    btn.addEventListener('click', () => copyChar(char, btn));
    btn.addEventListener('mouseenter', () => { showDotTip(btn); updateInfoBar(btn); });
    btn.addEventListener('focus', () => { showDotTip(btn); updateInfoBar(btn); });
    btn.addEventListener('mouseleave', () => { hideDotTip(); resetInfoBar(); });
    btn.addEventListener('blur', () => { hideDotTip(); resetInfoBar(); });
    frag.appendChild(btn);
  }
  grid.appendChild(frag);

  // Sorting: cycles Unicode order -> Dot count -> English Braille meaning
  const SORT_MODES = [
    { key: 'unicode', icon: '#', label: 'Sorted by Unicode order' },
    { key: 'dotcount', icon: '\u2261', label: 'Sorted by dot count' },
    { key: 'meaning', icon: 'A', label: 'Sorted by English Braille meaning' }
  ];
  let sortIndex = SORT_MODES.findIndex(m => m.key === localStorage.getItem('braille-palette-sort'));
  if (sortIndex < 0) sortIndex = 0;

  function applySort(){
    const mode = SORT_MODES[sortIndex];
    sortToggle.textContent = mode.icon;
    sortToggle.setAttribute('aria-label', mode.label);
    localStorage.setItem('braille-palette-sort', mode.key);

    const cells = Array.from(grid.children);
    cells.sort((a, b) => {
      const ma = Number(a.dataset.mask), mb = Number(b.dataset.mask);
      if (mode.key === 'unicode') return ma - mb;
      if (mode.key === 'dotcount') {
        const diff = countBits(ma) - countBits(mb);
        return diff !== 0 ? diff : ma - mb;
      }
      // meaning
      const ka = meaningSortKey(ma), kb = meaningSortKey(mb);
      return ka < kb ? -1 : ka > kb ? 1 : ma - mb;
    });

    const frag2 = document.createDocumentFragment();
    cells.forEach(c => frag2.appendChild(c));
    grid.appendChild(frag2);
  }

  sortToggle.addEventListener('click', () => {
    sortIndex = (sortIndex + 1) % SORT_MODES.length;
    applySort();
  });
  applySort();

  function dotsHtmlFor(mask){
    return DOT_LAYOUT.map(dotNum => {
      const bit = 1 << (dotNum - 1);
      const on = (mask & bit) !== 0;
      return '<span class="dot' + (on ? ' on' : '') + '">' + dotNum + '</span>';
    }).join('');
  }

  function updateInfoBar(btn){
    const mask = Number(btn.dataset.mask);
    infoText.innerHTML = '<span class="info-char">' + btn.textContent + '</span>' +
      btn.dataset.hex + ' \u00b7 ' + describeMeaning(mask);
  }

  function resetInfoBar(){
    infoText.textContent = infoTextDefault;
  }

  function showDotTip(btn){
    if (!dotTipEnabled) return;
    const mask = Number(btn.dataset.mask);
    dotTip.innerHTML = '<span class="dot-grid">' + dotsHtmlFor(mask) + '</span>';

    const rect = btn.getBoundingClientRect();
    dotTip.style.left = (rect.left + rect.width / 2) + 'px';
    const minTop = document.getElementById('info-bar').getBoundingClientRect().bottom + 6;
    let top = rect.top - dotTip.offsetHeight - 10;
    if (top < minTop) top = rect.bottom + 10; // flip below if it would cover the info bar
    dotTip.style.top = top + 'px';
    dotTip.classList.add('show');
  }

  function hideDotTip(){
    dotTip.classList.remove('show');
  }

  let toastTimer = null;
  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 900);
  }

  function copyChar(char, btn){
    const done = () => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 250);
      showToast('Copied ' + char + '  (U+' + char.codePointAt(0).toString(16).toUpperCase() + ')');
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(char).then(done).catch(() => fallbackCopy(char, done));
    } else {
      fallbackCopy(char, done);
    }
  }

  function fallbackCopy(char, done){
    const ta = document.createElement('textarea');
    ta.value = char;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    done();
  }

  // Theme handling
  function applyTheme(theme){
    if (theme === 'dark') {
      root.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '◆';
    } else {
      root.removeAttribute('data-theme');
      themeToggle.textContent = '◇';
    }
    localStorage.setItem('braille-palette-theme', theme);
  }

  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const savedTheme = localStorage.getItem('braille-palette-theme') || (prefersDark ? 'dark' : 'light');
  applyTheme(savedTheme);

  themeToggle.addEventListener('click', () => {
    const isDark = root.getAttribute('data-theme') === 'dark';
    applyTheme(isDark ? 'light' : 'dark');
  });
</script>

</body>
</html>
